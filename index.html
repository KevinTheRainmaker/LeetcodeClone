<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LeetCode Clone</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="logo">🧩 LeetCode Clone</div>
      <div class="controls">
        <span id="progressBadge" class="badge medium">0 / 0</span>
        <span id="currentModeBadge" class="badge easy">MODE: -</span>
        <button id="runBtn" class="btn secondary">Run</button>
        <button id="submitBtn" class="btn primary">Submit</button>
        <button id="nextProblemBtn" class="btn primary">다음 문제</button>
      </div>
    </header>

    <main class="layout simple">
      <section class="panel middle full">
        <div class="problem-header">
          <h2 id="problemTitle"></h2>
        </div>
        <p id="problemDesc" class="problem-desc"></p>

        <h3>Examples</h3>
        <div id="examples"></div>
      </section>

      <section class="panel right">
        <h3>Code</h3>
        <textarea id="editor" spellcheck="false"></textarea>
        <div class="result-wrap">
          <h3>Result</h3>
          <pre id="result">아직 실행 결과가 없습니다.</pre>
        </div>
      </section>
    </main>

    <section class="extra-layout">
      <section class="panel">
        <h3 id="modeSectionTitle">Mode</h3>
        <div id="memoMode" class="mode-panel">
          <h3>Self-Explain</h3>
          <p class="helper-text">문제 접근법, 핵심 아이디어, 시간복잡도/공간복잡도를 직접 설명해보세요. (자동저장 + 최종저장)</p>
          <textarea id="memoInput" class="memo-input"></textarea>
          <div class="row">
            <span id="memoSavedAt" class="muted">아직 저장되지 않았습니다.</span>
            <div>
              <button id="memoFinalSaveBtn" class="btn primary">최종저장</button>
            </div>
          </div>
        </div>

        <div id="assistantMode" class="mode-panel">
          <h3>Chat</h3>
          <p class="helper-text">질문을 입력하면 코드 스니펫 + 해설을 제공합니다. 멀티턴 메모리와 로그 저장을 지원합니다.</p>
          <div class="row">
            <label class="muted">Session:</label>
            <input id="chatSessionId" class="text-input" readonly />
            <button id="newSessionBtn" class="btn secondary">새 세션</button>
            <button id="downloadLogBtn" class="btn secondary">로그 다운로드</button>
          </div>
          <div id="chatHistory" class="chat-history"></div>
          <h4>Question</h4>
          <textarea id="chatInput" class="memo-input"></textarea>
          <div class="row">
            <span class="muted">모델 응답은 judge-server를 통해 호출됩니다.</span>
            <button id="chatSendBtn" class="btn primary">질문 보내기</button>
          </div>
        </div>

        <div id="socraticMode" class="mode-panel">
          <div class="blank-window"></div>
        </div>
      </section>
    </section>

    <script src="app.js"></script>
  </body>
</html>
